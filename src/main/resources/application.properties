spring.application.name=email-api

# -----------------------------
# SERVER CONFIG
# -----------------------------
server.port=8080

# -----------------------------
# H2 DATABASE CONFIG
# -----------------------------
spring.datasource.url=jdbc:h2:mem:emaildb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# -----------------------------
# JPA / HIBERNATE CONFIG
# -----------------------------
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# -----------------------------
# H2 CONSOLE ENABLEMENT
# -----------------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# -----------------------------
# JACKSON
# -----------------------------
# Serialize Instant/LocalDateTime as ISO-8601 strings instead of epoch numbers.
spring.jackson.serialization.write-dates-as-timestamps=false

# -----------------------------
# ASYNC THREAD POOL (Spring Boot defaults shown; uncomment to tune)
# -----------------------------
# spring.task.execution.pool.core-size=4
# spring.task.execution.pool.max-size=8
# spring.task.execution.pool.queue-capacity=100

# -----------------------------
# LOGGING (Optional but Useful)
# -----------------------------
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.example.demo=DEBUG
